<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            text-align: center;
        }
        .title {
            font-size: 2em;
            margin: 20px;
            color: #333;
            transition: color 0.3s ease;
        }
        .title:hover {
            color: #ff6347; /* Tomato color */
        }
        .contact-box {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5); /* Red shadow */
            margin: 20px auto;
            max-width: 400px;
            padding: 20px;
            text-align: left;
        }
        .contact-box h2 {
            margin-top: 0;
        }
        .contact-item {
            margin-bottom: 15px;
        }
        .contact-item img {
            vertical-align: middle;
            margin-right: 10px;
        }
        .stars {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .star {
            font-size: 2em;
            color: #ff6347; /* Tomato color */
            margin: 0 5px;
            transition: text-shadow 0.3s ease;
        }
        .star:hover {
            text-shadow: 0 0 10px #ff6347, 0 0 20px #ff6347;
        }
    </style>
</head>
<body>

    <div class="title">Contact Me</div>

    <div class="contact-box">
        <div class="contact-item">
            <img src="https://img.icons8.com/ios-filled/50/000000/phone.png" alt="Phone Icon"> 
            Mobile: +1234567890
        </div>
        <div class="contact-item">
            <img src="https://img.icons8.com/ios-filled/50/000000/instagram-new.png" alt="Instagram Icon">
            Instagram: @myinstagram
        </div>
        <div class="contact-item">
            <img src="https://img.icons8.com/ios-filled/50/000000/facebook-new.png" alt="Facebook Icon">
            Facebook: @myfacebook
        </div>
        <div class="contact-item">
            <img src="https://img.icons8.com/ios-filled/50/000000/twitter.png" alt="Twitter Icon">
            Twitter: @mytwitter
        </div>
        <div class="contact-item">
            <img src="https://img.icons8.com/ios-filled/50/000000/mail.png" alt="Email Icon">
            Email: myemail@example.com
        </div>
        <div class="contact-item">
            <img src="https://img.icons8.com/ios-filled/50/000000/post-office.png" alt="Post Office Icon">
            Post Office Box: 12345
        </div>
    </div>

    <div class="stars">
        <span class="star">*</span>
        <span class="star">*</span>
        <span class="star">*</span>
        <span class="star">*</span>
        <span class="star">*</span>
        <span class="star">*</span>
        <span class="star">*</span>
    </div>
